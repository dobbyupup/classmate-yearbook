<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>同学录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

:root {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --card-bg2: #1a1a1a;
  --text: #f0f0f0;
  --text-sec: #888;
  --accent: #fff;
  --border: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.04);
  --glass2: rgba(255,255,255,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  font-family:'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg); color:var(--text);
  overflow:hidden; font-size:14px;
  -webkit-font-smoothing:antialiased;
}

.app { width:100%; height:100%; position:relative; overflow:hidden; }
.screens { display:flex; flex-direction:column; height:calc(100% - 60px); overflow:hidden; }
.screen { width:100%; height:100%; flex-shrink:0; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch; display:none; }
.screen.active { display:block; }
.screen::-webkit-scrollbar { display:none; }
.screen { scrollbar-width:none; }

/* ===== 底部导航 ===== */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:1000;
  display:flex; align-items:center; justify-content:space-around;
  height:60px; padding-bottom:var(--safe-bottom);
  background:rgba(10,10,10,0.92); backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.tab-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; padding:6px 16px; transition:all .2s;
  color:var(--text-sec); font-size:10px; font-weight:500;
}
.tab-item.active { color:var(--accent); }
.tab-item svg { width:22px; height:22px; transition:all .2s; }
.tab-item.active svg { transform:scale(1.1); }

/* ===== 顶部栏 ===== */
.top-bar {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; padding-top:calc(var(--safe-top) + 8px);
  background:rgba(10,10,10,0.85); backdrop-filter:blur(20px);
}
.top-title { font-size:18px; font-weight:700; letter-spacing:1px; }
.top-bar-left { display:flex; align-items:center; gap:10px; }
.top-bar-right { display:flex; align-items:center; gap:8px; }
.top-btn {
  width:36px; height:36px; border-radius:50%;
  background:var(--glass2); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s; border:none; color:var(--text);
}
.top-btn:active { transform:scale(0.9); background:var(--glass); }
.top-btn svg { width:18px; height:18px; }

/* ========================================
   第一屏：3D 悬浮卡片墙
   ======================================== */
.home-screen { position:relative; background:#050505; }

.scene-3d {
  position:relative; width:100%; height:100vh;
  perspective:1200px; perspective-origin:50% 50%;
  overflow:hidden;
}
.scene-3d::before {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0; z-index:2;
  background:
    radial-gradient(ellipse 60% 40% at 50% 30%, rgba(255,255,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 30% 60%, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events:none;
}

.volumetric-light {
  position:absolute; top:-20%; left:20%; width:60%; height:80%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
  z-index:1; pointer-events:none; animation:lightPulse 8s ease-in-out infinite;
}
@keyframes lightPulse {
  0%,100% { opacity:0.6; transform:scale(1); }
  50% { opacity:1; transform:scale(1.1); }
}

.bokeh { position:absolute; border-radius:50%; pointer-events:none; z-index:3; }

.cards-3d {
  position:absolute; top:0; left:0; width:100%; height:100%;
  transform-style:preserve-3d; z-index:5;
}

.photo-card {
  position:absolute; width:100px; height:130px;
  background:#fff; border-radius:6px; padding:6px 6px 20px 6px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
  cursor:pointer; transition:transform .4s cubic-bezier(.25,.8,.25,1), box-shadow .4s;
  transform-style:preserve-3d; will-change:transform;
}
.photo-card::after {
  content:''; position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  width:60%; height:4px; border-radius:2px; background:rgba(0,0,0,0.06);
}
.photo-card img {
  width:100%; height:calc(100% - 14px); object-fit:cover; border-radius:3px;
  display:block; background:#e0e0e0;
}
.photo-card .card-name {
  position:absolute; bottom:4px; left:0; right:0;
  text-align:center; font-size:7px; color:#555; font-weight:500;
  letter-spacing:0.5px;
}
.photo-card:active {
  transform:scale(1.15) translateZ(60px) !important;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
}

.depth-near { filter:blur(0px); z-index:10; }
.depth-mid { filter:blur(0.5px); z-index:5; opacity:0.9; }
.depth-far { filter:blur(2px); z-index:1; opacity:0.6; }

@keyframes float1 { 0%,100% { transform:translateY(0) rotateY(var(--ry)) rotateX(var(--rx)); } 50% { transform:translateY(-15px) rotateY(calc(var(--ry) + 3deg)) rotateX(calc(var(--rx) - 2deg)); } }
@keyframes float2 { 0%,100% { transform:translateY(0) rotateY(var(--ry)) rotateX(var(--rx)); } 50% { transform:translateY(-20px) rotateY(calc(var(--ry) - 4deg)) rotateX(calc(var(--rx) + 3deg)); } }
@keyframes float3 { 0%,100% { transform:translateY(0) rotateY(var(--ry)) rotateX(var(--rx)); } 50% { transform:translateY(-10px) rotateY(calc(var(--ry) + 2deg)) rotateX(calc(var(--rx) - 1deg)); } }

.home-hero {
  position:absolute; bottom:100px; left:0; right:0; z-index:20;
  text-align:center; padding:0 30px;
}
.home-hero h1 {
  font-size:28px; font-weight:900; letter-spacing:4px;
  background:linear-gradient(180deg, #fff 40%, rgba(255,255,255,0.4));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.home-hero p { font-size:12px; color:var(--text-sec); letter-spacing:2px; font-weight:300; }

/* 复旦校徽按钮 */
.badge-btn {
  position:absolute; top:calc(var(--safe-top) + 12px); right:20px; z-index:50;
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,0.08); backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .3s; overflow:hidden;
}
.badge-btn:active { transform:scale(0.9); }
.badge-btn img { width:36px; height:36px; border-radius:50%; }
.badge-btn .fudan-badge {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
}

/* ========================================
   第二屏：留言墙
   ======================================== */
.msg-screen { background:var(--bg); }

.msg-top-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

/* 排序折叠 */
.sort-toggle {
  position:relative; display:flex; align-items:center; gap:6px;
  cursor:pointer; padding:6px 12px; border-radius:8px;
  background:var(--glass2); border:1px solid var(--border);
  color:var(--text-sec); font-size:12px; transition:all .2s;
}
.sort-toggle:active { transform:scale(0.95); }
.sort-toggle svg { width:14px; height:14px; transition:transform .3s; }
.sort-toggle.open svg { transform:rotate(180deg); }
.sort-dropdown {
  position:absolute; top:calc(100% + 6px); left:0; z-index:50;
  background:rgba(20,20,20,0.98); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  overflow:hidden; min-width:120px;
  opacity:0; transform:translateY(-8px); pointer-events:none;
  transition:all .2s;
}
.sort-dropdown.show { opacity:1; transform:translateY(0); pointer-events:auto; }
.sort-option {
  padding:10px 16px; font-size:12px; color:var(--text-sec);
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:8px;
}
.sort-option:hover, .sort-option:active { background:var(--glass2); color:#fff; }
.sort-option.active { color:#fff; }
.sort-option.active::before {
  content:''; width:4px; height:4px; border-radius:50%; background:#fff;
}

.msg-tabs {
  display:flex; gap:0; flex:1; margin-left:12px;
}
.msg-tab {
  flex:1; text-align:center; padding:10px 0; font-size:13px;
  color:var(--text-sec); cursor:pointer; position:relative;
  font-weight:500; transition:color .2s;
}
.msg-tab.active { color:var(--accent); }
.msg-tab.active::after {
  content:''; position:absolute; bottom:0; left:30%; right:30%;
  height:2px; background:#fff; border-radius:1px;
}

.msg-top-divider {
  height:1px; background:var(--border); margin:0 20px 14px;
}

/* 瀑布流 */
.msg-masonry {
  padding:0 12px 100px;
  column-count:2; column-gap:10px;
}
.msg-card {
  break-inside:avoid; margin-bottom:10px;
  position:relative; border-radius:var(--radius-sm); overflow:hidden;
  cursor:pointer; transition:transform .2s;
  display:inline-block; width:100%;
}
.msg-card:active { transform:scale(0.97); }
.msg-card-bg {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background-size:cover; background-position:center;
}
.msg-card-bg::after {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%);
}
.msg-card-plain { background:var(--card-bg); border:1px solid var(--border); }
.msg-card-content {
  position:relative; z-index:1; padding:14px;
  display:flex; flex-direction:column;
}
.msg-card-header {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
}
.msg-avatar {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.2);
  overflow:hidden; flex-shrink:0;
}
.msg-avatar img { width:100%; height:100%; object-fit:cover; }
.msg-user-info { display:flex; flex-direction:column; }
.msg-username { font-size:11px; font-weight:600; }
.msg-time { font-size:9px; color:rgba(255,255,255,0.4); }
.msg-text { font-size:12px; line-height:1.65; color:rgba(255,255,255,0.9); font-weight:300; }

.msg-voice {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.1); border-radius:16px;
  padding:6px 12px; width:fit-content;
}
.voice-icon { width:16px; height:16px; color:#fff; }
.voice-wave { display:flex; align-items:center; gap:2px; height:16px; }
.voice-wave span {
  width:2px; border-radius:1px; background:rgba(255,255,255,0.6);
  animation:waveAnim 1.2s ease-in-out infinite;
}
.voice-wave span:nth-child(1) { height:5px; animation-delay:0s; }
.voice-wave span:nth-child(2) { height:10px; animation-delay:0.1s; }
.voice-wave span:nth-child(3) { height:7px; animation-delay:0.2s; }
.voice-wave span:nth-child(4) { height:13px; animation-delay:0.3s; }
.voice-wave span:nth-child(5) { height:8px; animation-delay:0.4s; }
.voice-wave span:nth-child(6) { height:5px; animation-delay:0.5s; }
.voice-dur { font-size:10px; color:rgba(255,255,255,0.4); }
@keyframes waveAnim {
  0%,100% { transform:scaleY(1); }
  50% { transform:scaleY(0.4); }
}

.msg-card-footer {
  display:flex; align-items:center; gap:12px; margin-top:10px;
}
.msg-action {
  display:flex; align-items:center; gap:3px;
  font-size:10px; color:rgba(255,255,255,0.35);
}
.msg-action svg { width:12px; height:12px; }

.fab-write {
  position:fixed; bottom:80px; right:20px; z-index:100;
  width:52px; height:52px; border-radius:50%;
  background:#fff; color:#000;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  cursor:pointer; border:none; transition:all .2s;
}
.fab-write.show { display:flex; }
.fab-write:active { transform:scale(0.9); }
.fab-write svg { width:22px; height:22px; }

/* ========================================
   第三屏：时间轴
   ======================================== */
.timeline-screen { background:var(--bg); }
.timeline-wrap { padding:0 20px 100px; position:relative; }
.timeline-line {
  position:absolute; left:36px; top:0; bottom:0;
  width:1px; background:linear-gradient(180deg, transparent, var(--border) 5%, var(--border) 95%, transparent);
}
.timeline-item { position:relative; padding-left:50px; margin-bottom:30px; }
.timeline-dot {
  position:absolute; left:30px; top:6px;
  width:13px; height:13px; border-radius:50%;
  background:var(--bg); border:2px solid rgba(255,255,255,0.3); z-index:1;
}
.timeline-item.highlight .timeline-dot {
  border-color:#fff; background:#fff;
  box-shadow:0 0 12px rgba(255,255,255,0.3);
}
.timeline-date { font-size:11px; color:var(--text-sec); margin-bottom:6px; font-weight:500; }
.timeline-card {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px; transition:all .2s;
}
.timeline-card:active { transform:scale(0.98); }
.timeline-card h4 { font-size:14px; font-weight:600; margin-bottom:6px; }
.timeline-card p { font-size:12px; color:var(--text-sec); line-height:1.6; }
.timeline-card .tl-photo {
  width:100%; height:160px; border-radius:var(--radius-sm);
  background:var(--card-bg2); margin-top:10px; overflow:hidden;
}
.timeline-card .tl-photo img {
  width:100%; height:100%; object-fit:cover;
  background:#1a1a1a;
}
.timeline-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.timeline-tag {
  font-size:10px; padding:3px 10px; border-radius:20px;
  background:var(--glass2); color:var(--text-sec);
}
.timeline-friends { display:flex; align-items:center; gap:4px; margin-top:10px; }
.timeline-friends span { font-size:10px; color:var(--text-sec); }
.tl-friend-av {
  width:20px; height:20px; border-radius:50%;
  background:linear-gradient(135deg,#333,#555);
  border:1px solid var(--border); margin-left:-6px;
  overflow:hidden;
}
.tl-friend-av:first-child { margin-left:0; }
.tl-friend-av img { width:100%; height:100%; object-fit:cover; }

.alumni-btn {
  display:flex; align-items:center; gap:6px;
  background:var(--glass2); border-radius:20px;
  padding:6px 14px; border:1px solid var(--border);
  color:var(--text); font-size:12px; cursor:pointer; transition:all .2s;
}
.alumni-btn:active { transform:scale(0.95); }
.alumni-btn svg { width:14px; height:14px; }

.alumni-panel {
  position:fixed; top:0; right:-100%; width:85%; max-width:360px; height:100%;
  background:rgba(15,15,15,0.98); backdrop-filter:blur(30px);
  z-index:2000; transition:right .4s cubic-bezier(.25,.8,.25,1);
  padding:60px 24px 30px; overflow-y:auto;
  border-left:1px solid var(--border);
}
.alumni-panel.show { right:0; }
.search-box {
  display:flex; align-items:center; gap:10px;
  background:var(--glass2); border-radius:var(--radius-sm);
  padding:10px 14px; margin-bottom:20px;
  border:1px solid var(--border);
}
.search-box svg { width:16px; height:16px; color:var(--text-sec); flex-shrink:0; }
.search-box input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-size:13px; font-family:inherit;
}
.search-box input::placeholder { color:var(--text-sec); }
.relation-graph {
  width:100%; height:200px; border-radius:var(--radius);
  background:var(--card-bg); border:1px solid var(--border);
  margin-bottom:20px; position:relative; overflow:hidden;
}
.relation-graph canvas { width:100%; height:100%; }
.alumni-list { display:flex; flex-direction:column; gap:12px; }
.alumni-item {
  display:flex; align-items:center; gap:12px; padding:12px;
  background:var(--card-bg); border-radius:var(--radius-sm);
  border:1px solid var(--border); cursor:pointer;
}
.alumni-item:active { background:var(--glass2); }
.alumni-av {
  width:40px; height:40px; border-radius:50%;
  background:linear-gradient(135deg,#333,#555);
  flex-shrink:0; overflow:hidden;
}
.alumni-av img { width:100%; height:100%; object-fit:cover; }
.alumni-info { flex:1; }
.alumni-name { font-size:13px; font-weight:600; }
.alumni-dept { font-size:11px; color:var(--text-sec); }
.alumni-relation {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:var(--glass2); color:var(--text-sec);
}

/* ========================================
   第四屏：个人中心
   ======================================== */
.profile-screen { background:var(--bg); }
.profile-wrap { padding:0 20px 120px; }
.profile-header { text-align:center; padding:20px 0 24px; }
.profile-avatar {
  width:80px; height:80px; border-radius:50%; margin:0 auto 14px;
  background:linear-gradient(135deg, #222, #444);
  border:2px solid rgba(255,255,255,0.1);
  position:relative; overflow:hidden;
}
.profile-avatar img { width:100%; height:100%; object-fit:cover; }
.profile-name { font-size:18px; font-weight:700; margin-bottom:4px; }
.profile-dept { font-size:12px; color:var(--text-sec); margin-bottom:10px; }
.profile-bio {
  font-size:12px; color:var(--text-sec); line-height:1.6;
  max-width:260px; margin:0 auto; font-weight:300;
}
.profile-actions { display:flex; gap:12px; margin:20px 0; }
.profile-btn {
  flex:1; padding:12px; border-radius:var(--radius-sm);
  text-align:center; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .2s; border:none; font-family:inherit;
}
.profile-btn:active { transform:scale(0.97); }
.profile-btn.primary { background:#fff; color:#000; }
.profile-btn.secondary { background:var(--card-bg); color:var(--text); border:1px solid var(--border); }

.section-title {
  font-size:15px; font-weight:700; margin:24px 0 12px;
  display:flex; align-items:center; gap:8px;
}
.section-title svg { width:16px; height:16px; color:var(--text-sec); }

.tags-wrap { display:flex; flex-wrap:wrap; gap:8px; }
.tag-item {
  padding:6px 14px; border-radius:20px; font-size:12px;
  background:var(--glass2); color:var(--text-sec); border:1px solid var(--border);
}
.tag-item.highlight { background:rgba(255,255,255,0.12); color:#fff; }

.honor-list { display:flex; flex-direction:column; gap:10px; }
.honor-item {
  display:flex; align-items:center; gap:12px; padding:14px;
  background:var(--card-bg); border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.honor-icon {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.honor-icon svg { width:18px; height:18px; }
.honor-info { flex:1; }
.honor-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.honor-sub { font-size:11px; color:var(--text-sec); }

.mailbox-card {
  background:var(--card-bg); border-radius:var(--radius);
  border:1px solid var(--border); padding:20px; position:relative; overflow:hidden;
}
.mailbox-card::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:100px; height:100px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.04), transparent);
}
.mailbox-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
}
.mailbox-header h4 { font-size:14px; font-weight:600; }
.mailbox-status {
  font-size:10px; padding:3px 10px; border-radius:10px;
  background:var(--glass2); color:var(--text-sec);
}
.mailbox-info { font-size:12px; color:var(--text-sec); line-height:1.6; margin-bottom:14px; }
.mailbox-btn {
  width:100%; padding:10px; border-radius:var(--radius-sm);
  background:var(--glass2); border:1px solid var(--border);
  color:var(--text); font-size:12px; font-weight:500;
  cursor:pointer; transition:all .2s; font-family:inherit;
}
.mailbox-btn:active { transform:scale(0.98); }

/* 校友来信 */
.alumni-letters { display:flex; flex-direction:column; gap:12px; margin-top:14px; margin-bottom:14px; }
.alumni-letter {
  background:var(--glass2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px; position:relative;
}
.alumni-letter::before {
  content:'\201C'; position:absolute; top:6px; left:10px;
  font-size:28px; color:rgba(255,255,255,0.08); font-family:Georgia,serif; line-height:1;
}
.alumni-letter-header {

}

.track-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.track-card {

}
.track-value { font-size:24px; font-weight:900; margin-bottom:4px; letter-spacing:-1px; }
.track-label { font-size:11px; color:var(--text-sec); }

}

.badge-panel.show { right:0; }
.badge-menu-item {

.badge-menu-item:active { padding-left:8px; }
.badge-menu-icon {

// ===== 第一屏：3D 卡片墙 =====
function initCards() {
  const container = document.getElementById('cards3d');
  const scene = document.getElementById('scene3d');
  const w = scene.offsetWidth;
  const h = scene.offsetHeight;

  classmates.forEach((mate, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';

    const depthLayer = i % 3;
    if (depthLayer === 0) card.classList.add('depth-near');
    else if (depthLayer === 1) card.classList.add('depth-mid');
    else card.classList.add('depth-far');

    const scale = depthLayer === 0 ? 1 : depthLayer === 1 ? 0.8 : 0.6;
    const x = 10 + Math.random() * (w - 130);
    const y = 40 + Math.random() * (h - 220);
    const ry = -15 + Math.random() * 30;
    const rx = -8 + Math.random() * 16;
    const floatAnim = ['float1','float2','float3'][Math.floor(Math.random()*3)];
    const dur = 4 + Math.random() * 4;
    const delay = Math.random() * -8;

    card.style.cssText = `
      left:${x}px; top:${y}px;
      --ry:${ry}deg; --rx:${rx}deg;
      transform:rotateY(${ry}deg) rotateX(${rx}deg) scale(${scale});
      animation:${floatAnim} ${dur}s ease-in-out ${delay}s infinite;
    `;

    const img = document.createElement('img');
    img.src = studentPhotos[i % studentPhotos.length];
    img.alt = mate.name;
    img.loading = 'lazy';
    card.appendChild(img);

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = mate.name;
    card.appendChild(nameEl);

    container.appendChild(card);
  });

  for (let i = 0; i < 12; i++) {
    const bokeh = document.createElement('div');
    bokeh.className = 'bokeh';
    const size = 4 + Math.random() * 20;
    bokeh.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      background:radial-gradient(circle, rgba(255,255,255,${0.03+Math.random()*0.06}), transparent);
      animation:float${1+Math.floor(Math.random()*3)} ${6+Math.random()*6}s ease-in-out ${Math.random()*-10}s infinite;
    `;
    scene.appendChild(bokeh);
  }

  let tiltX = 0, tiltY = 0;
  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    tiltX = (touch.clientX / w - 0.5) * 10;
    tiltY = (touch.clientY / h - 0.5) * 10;
    container.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
  }, { passive: true });
  document.addEventListener('mousemove', (e) => {
    tiltX = (e.clientX / w - 0.5) * 10;
    tiltY = (e.clientY / h - 0.5) * 10;
    container.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
  });
}

// 排序切换
function toggleSort() {
  document.getElementById('sortDropdown').classList.toggle('show');
  document.getElementById('sortToggle').classList.toggle('open');
}
function setSort(type, e) {
  e.stopPropagation();
  currentSort = type;
  document.getElementById('sortLabel').textContent = type === 'latest' ? '最新' : '最热';
  document.querySelectorAll('.sort-option').forEach(o => o.classList.remove('active'));
  document.querySelector(`.sort-option[data-sort="${type}"]`).classList.add('active');
  document.getElementById('sortDropdown').classList.remove('show');
  document.getElementById('sortToggle').classList.remove('open');
  const activeCat = document.querySelector('.msg-tab.active')?.dataset.cat || 'all';
  renderMessages(activeCat);
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.sort-toggle')) {
    document.getElementById('sortDropdown')?.classList.remove('show');
    document.getElementById('sortToggle')?.classList.remove('open');
  }
});

// ===== 校友关系图 =====
function renderRelationGraph() {
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const cx = rect.width / 2, cy = rect.height / 2;
  const nodes = [
    { x:cx, y:cy, r:18, name:'我', main:true },
    ...alumniData.map((a, i) => ({
      x: cx + Math.cos(i * Math.PI * 2 / alumniData.length) * 70,
      y: cy + Math.sin(i * Math.PI * 2 / alumniData.length) * 60,
      r: 12, name: a.name
    }))
  ];
  nodes.forEach((n, i) => {
    if (i === 0) return;
    ctx.beginPath(); ctx.moveTo(nodes[0].x, nodes[0].y); ctx.lineTo(n.x, n.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();
  });
  nodes.forEach(n => {
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = n.main ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle = n.main ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = n.main ? '#fff' : 'rgba(255,255,255,0.6)';
    ctx.font = `${n.main ? '11' : '9'}px "Noto Sans SC", sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.name, n.x, n.y);
  });
}

// ===== 标签页切换 =====
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(tab.dataset.screen).classList.add('active');
    const fabBtn = document.querySelector('.fab-write');
    fabBtn.classList.toggle('show', tab.dataset.screen === 'screen-msg');
  });
});

document.querySelectorAll('.msg-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.msg-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderMessages(tab.dataset.cat);
  });
});
